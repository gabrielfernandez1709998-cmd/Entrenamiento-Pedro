<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f4f1ec">
<title>Mi Entrenamiento — Pedro</title>
<style>
:root{
  --bg:#f4f1ec;--bg2:#ebe6de;--card:#fff;
  --t:#1a1815;--t2:#5c5549;--t3:#9a9085;
  --gr:#2d7a5f;--grl:#e8f4ef;--grm:#a8d5c4;
  --am:#a85c0a;--aml:#fdf0e3;
  --bl:#1a5f8a;--bll:#e6f0f7;
  --re:#b83228;--rel:#fdecea;
  --bo:rgba(26,24,21,.09);
  --sh:0 1px 8px rgba(26,24,21,.06);
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:100dvh;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;min-height:100dvh;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;color:var(--t);
  background:var(--bg);
  max-width:480px;margin:0 auto;
  
  display:flex;flex-direction:column;
}

/* ── SETUP ── */

/* ── MAIN APP ── */
#mainApp{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
}

/* NAV */
.nav{
  flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--bo);
  padding:13px 16px 11px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-title{font-family:Georgia, 'Times New Roman', serif;font-size:20px;color:var(--t);line-height:1.2}
.nav-pedro{font-size:11px;color:var(--gr);font-weight:600;margin-top:1px}
.nav-sub{font-size:11px;color:var(--t3);margin-top:1px}
.nav-ico{
  background:var(--card);border:1px solid var(--bo);border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;flex-shrink:0;
}

/* SCREENS WRAP */
#screensWrap{
  flex:1;min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* SCREENS */
.scr{display:none;padding-bottom:20px}
.scr.on{display:block}

/* TABS */
.tabs{
  flex-shrink:0;
  background:var(--card);border-top:1px solid var(--bo);
  display:flex;
}
.tab{
  flex:1;padding:9px 0 13px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;border:none;background:none;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;color:var(--t3);font-size:11px;font-weight:500;
  transition:color .15s;
}
.tab.on{color:var(--gr)}
.tab-i{font-size:20px}

/* SETUP PAGE */

/* HERO */
.hero{padding:20px 16px 22px;overflow:hidden}
.hero-pedro{font-size:13px;color:rgba(255,255,255,.8);font-weight:500;margin-bottom:5px}
.hero-quote{
  font-family:Georgia, 'Times New Roman', serif;
  font-size:17px;font-style:italic;line-height:1.5;
  margin-bottom:4px;color:#fff;
  word-wrap:break-word;overflow-wrap:break-word;
}
.hero-author{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:16px}
.hero-pills{display:flex;gap:8px}
.hero-pill{flex:1;background:rgba(255,255,255,.14);border-radius:10px;padding:10px 6px;text-align:center}
.hero-num{font-size:20px;font-weight:600;color:#fff;line-height:1}
.hero-lbl{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px}
.hero-prog{margin-top:14px}
.hero-prog-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;margin-bottom:5px}
.hero-prog-fill{height:100%;background:rgba(255,255,255,.75);border-radius:2px;transition:width .6s}
.hero-prog-lbl{display:flex;justify-content:space-between}
.hero-prog-lbl span{font-size:10px;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:49%}

/* SECTION TITLE */
.sec{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:14px 14px 6px}

/* WEEK MINI GRID */
.wg{display:flex;gap:4px;padding:0 14px 6px}
.wg-d{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wg-l{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase}
.wg-dot{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg2);border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;color:var(--t3);
  -webkit-tap-highlight-color:rgba(0,0,0,.05);
}
.wg-dot.done{background:var(--gr);color:#fff;border-color:var(--gr)}
.wg-dot.today{border-color:var(--gr)}

/* TODAY CARD */
.today-card{margin:0 12px;background:var(--card);border-radius:var(--r);border:1px solid var(--bo);overflow:hidden;box-shadow:var(--sh)}
.today-hdr{padding:12px 12px 12px 14px;border-bottom:1px solid var(--bo);display:flex;align-items:flex-start;gap:8px}
.today-hdr-text{flex:1;min-width:0}
.today-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.today-title{font-size:15px;font-weight:600;margin-top:2px;color:var(--t);word-wrap:break-word;overflow-wrap:break-word;line-height:1.3}
.today-sub{font-size:11px;color:var(--t3);margin-top:2px;word-wrap:break-word;overflow-wrap:break-word}
.tei{display:flex;align-items:center;gap:9px;padding:7px 14px;border-bottom:1px solid var(--bo)}
.tei:last-child{border-bottom:none}
.tei-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tei-name{font-size:13px;font-weight:500;flex:1;color:var(--t);overflow-wrap:break-word;min-width:0}
.tei-sets{font-size:11px;color:var(--t3);flex-shrink:0;white-space:nowrap;margin-left:4px}

/* BADGES */
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;display:inline-block}
.bs{background:var(--grl);color:var(--gr)}
.ba{background:var(--aml);color:var(--am)}
.bb{background:var(--bll);color:var(--bl)}
.bgr{background:var(--bg2);color:var(--t3)}
.bred{background:var(--rel);color:var(--re)}

/* START BUTTON */
.btn-start{
  display:block;width:calc(100% - 24px);margin:10px 12px 0;
  color:#fff;border:none;border-radius:var(--rs);padding:14px;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;text-align:center;-webkit-appearance:none;
  transition:opacity .15s;
}
.btn-start:active{opacity:.85}

/* WEEK SCREEN */
.wk-hdr{padding:12px 14px 6px}
.wk-nav{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wk-nav-btn{
  background:var(--card);border:1px solid var(--bo);border-radius:50%;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;flex-shrink:0;color:var(--t);
}
.wk-nav-btn:active{background:var(--bg2)}
.wk-nav-title{font-family:Georgia, 'Times New Roman', serif;font-size:20px;flex:1;color:var(--t)}
.wk-phase-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;color:#fff;margin-bottom:8px}
.day-list{padding:0 10px}
.day-card{
  background:var(--card);border-radius:var(--r);border:1.5px solid var(--bo);
  box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05);
}
.day-card:active{opacity:.9}
.day-card.today-h{border-color:var(--gr)}
.day-inner{display:flex;align-items:stretch}
.day-left{
  width:54px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 0;
}
.day-letter{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase}
.day-num{font-size:20px;font-weight:600;color:var(--t);line-height:1.1}
.day-dot{width:6px;height:6px;border-radius:50%;margin-top:4px}
.day-body{flex:1;padding:11px 10px 11px 8px;border-left:1px solid var(--bo);min-width:0}
.day-name{
  font-size:13px;font-weight:600;color:var(--t);
  word-wrap:break-word;overflow-wrap:break-word;
  line-height:1.3;margin-bottom:5px;
}
.day-meta{display:flex;gap:5px;flex-wrap:wrap}
.day-arr{padding:0 12px;color:var(--t3);font-size:18px;display:flex;align-items:center;flex-shrink:0}

/* SESSION SCREEN */
.sess-top{padding:16px 14px 20px;color:#fff}
.sess-back{
  background:rgba(255,255,255,.15);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;cursor:pointer;margin-bottom:12px;
}
.sess-title{
  font-family:Georgia, 'Times New Roman', serif;font-size:21px;line-height:1.25;
  margin-bottom:3px;word-wrap:break-word;overflow-wrap:break-word;
}
.sess-sub{font-size:12px;opacity:.75;word-wrap:break-word;overflow-wrap:break-word}
.sess-tags{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.sess-tag{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);white-space:nowrap;
}
.warn-box{
  margin:10px 10px;background:var(--aml);
  border-left:3px solid var(--am);border-radius:0 var(--rs) var(--rs) 0;
  padding:10px 12px;font-size:12px;color:#7a4a0e;line-height:1.6;
  word-wrap:break-word;overflow-wrap:break-word;
}
.blk-lbl{
  font-size:10px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.07em;
  padding:12px 12px 4px;
}
.ex-card{margin:0 10px 6px;background:var(--card);border-radius:var(--rs);border:1px solid var(--bo);overflow:hidden}
.ex-hdr{display:flex;align-items:flex-start;gap:9px;padding:11px 11px;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.05);}
.ex-idx{
  width:22px;height:22px;border-radius:50%;
  font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.ex-name{
  font-size:14px;font-weight:600;flex:1;color:var(--t);
  word-wrap:break-word;overflow-wrap:break-word;line-height:1.3;
}
.ex-sets{font-size:12px;color:var(--t3);margin-top:3px;word-wrap:break-word}
.ex-arr{font-size:14px;color:var(--t3);padding-top:2px;flex-shrink:0}
.ex-body{display:none;padding:0 11px 12px 42px;border-top:1px solid var(--bo)}
.ex-body.open{display:block}
.ex-muscle{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--bg2);color:var(--t3);margin-top:8px}
.ex-desc{font-size:13px;color:var(--t2);line-height:1.65;padding-top:9px;word-wrap:break-word;overflow-wrap:break-word}
.ex-tip{font-size:12px;color:var(--bl);background:var(--bll);border-radius:6px;padding:8px 10px;margin-top:8px;line-height:1.55;word-wrap:break-word;overflow-wrap:break-word}
.ex-rest-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:10px;padding:10px 12px;
  background:var(--grl);border:none;border-radius:var(--rs);
  color:var(--gr);font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;width:100%;-webkit-appearance:none;
}
.ex-rest-btn:active{background:var(--grm)}
.done-btn-wrap{padding:14px 10px 6px}
.done-btn{
  width:100%;background:var(--gr);color:#fff;
  border:none;border-radius:var(--rs);padding:14px;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;text-align:center;-webkit-appearance:none;
}
.done-btn:active{opacity:.85}
.done-btn.done-c{background:var(--t3)}

/* PROGRESS */
.prog-hero{padding:20px 14px 24px;color:#fff}
.prog-title{font-family:Georgia, 'Times New Roman', serif;font-size:23px;margin-bottom:3px}
.prog-sub{font-size:12px;opacity:.75;margin-bottom:16px;word-wrap:break-word}
.prog-phase-wrap{background:rgba(255,255,255,.13);border-radius:10px;padding:12px 14px}
.prog-phase-name{font-size:14px;font-weight:600;margin-bottom:3px;word-wrap:break-word}
.prog-phase-desc{font-size:11px;opacity:.75;line-height:1.55;margin-bottom:10px;word-wrap:break-word}
.prog-bar-bg{background:rgba(255,255,255,.2);border-radius:3px;height:5px;overflow:hidden}
.prog-bar-fill{height:100%;background:#fff;border-radius:3px;transition:width .5s}
.prog-bar-lbl{display:flex;justify-content:space-between;margin-top:5px}
.prog-bar-lbl span{font-size:10px;opacity:.7}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 12px 0}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--bo);padding:12px 8px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:var(--gr);line-height:1}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:2px}
.phase-pills-wrap{display:flex;gap:6px;padding:0 12px;flex-wrap:wrap}
.phase-pill{
  padding:6px 12px;border-radius:20px;
  border:1.5px solid var(--bo);font-size:11px;font-weight:500;
  cursor:pointer;background:var(--card);color:var(--t2);line-height:1.3;text-align:center;
}
.phase-pill.cur{color:#fff;border-color:transparent}
.phase-pill.done-ph{border-color:var(--gr);color:var(--gr)}
.phase-pill-wk{font-size:10px;opacity:.7;display:block;margin-top:1px}
.log-item{
  background:var(--card);border-radius:var(--rs);border:1px solid var(--bo);
  margin:0 12px 7px;padding:11px 12px;
  display:flex;align-items:center;gap:10px;
}
.log-icon{font-size:18px;flex-shrink:0}
.log-name{font-size:13px;font-weight:600;color:var(--t);word-wrap:break-word;min-width:0;flex:1}
.log-date{font-size:11px;color:var(--t3)}
.log-ck{color:var(--gr);font-size:15px;flex-shrink:0}

/* TIMER OVERLAY */
.t-ov{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:200;background:rgba(18,16,13,.92);
  display:none;align-items:center;justify-content:center;flex-direction:column;
  pointer-events:none;
}
.t-ov.vis{display:flex;pointer-events:auto}
.t-ring{position:relative;width:180px;height:180px;margin-bottom:10px}
.t-ring svg{transform:rotate(-90deg)}
.t-ring-txt{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia, 'Times New Roman', serif;font-size:52px;color:#fff;line-height:1;
}
.t-lbl{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:24px;text-align:center;padding:0 20px}
.t-close{
  padding:12px 40px;background:rgba(255,255,255,.14);
  border:none;border-radius:28px;color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;-webkit-appearance:none;
}
.t-close:active{background:rgba(255,255,255,.25)}

/* MISC */
.spacer{height:12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* animations removed for iOS compatibility */

/* Android + cross-browser touch fixes */
button,a,[onclick]{touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,0);}
.day-card,.wg-dot,.ex-hdr,.nav-ico,.wk-nav-btn,.tab,.t-close,.btn-start,.done-btn,.btn-main,.ex-rest-btn{touch-action:manipulation;}
.scr.on{display:block;width:100%;}
</style>
</head>
<body>

<!-- TIMER OVERLAY -->
<div class="t-ov" id="tOv">
  <div class="t-ring">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="78" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="8"/>
      <circle id="tArc" cx="90" cy="90" r="78" fill="none" stroke="#a8d5c4" stroke-width="8"
        stroke-dasharray="490.1" stroke-dashoffset="0" stroke-linecap="round"/>
    </svg>
    <div class="t-ring-txt" id="tNum">45</div>
  </div>
  <div class="t-lbl" id="tLbl">Descansando…</div>
  <button class="t-close" onclick="stopTimer()">Listo ✓</button>
</div>

<!-- MAIN APP -->
<div id="mainApp">

  <div class="nav">
    <div>
      <div class="nav-title">Mi Entrenamiento</div>
      <div class="nav-pedro">¡Hola, Pedro! 👋</div>
      <div class="nav-sub" id="navSub"></div>
    </div>
    <div class="nav-ico" onclick="doReset()">⚙️</div>
  </div>

  <div id="screensWrap">

    <div class="scr" id="scrHome">
      <div id="heroWrap"></div>
      <div class="sec">Sesión de hoy</div>
      <div id="todayWrap"></div>
      <button id="todayBtn" class="btn-start" style="display:none;background:var(--gr)" onclick="openTodaySess()">▶ Empezar sesión de hoy</button>
      <div class="sec">Esta semana</div>
      <div class="wg" id="homeWg"></div>
      <div class="spacer"></div>
    </div>

    <div class="scr" id="scrWeek">
      <div class="wk-hdr">
        <div class="wk-nav">
          <button class="wk-nav-btn" onclick="changeWk(-1)">‹</button>
          <div class="wk-nav-title" id="wkTitle"></div>
          <button class="wk-nav-btn" onclick="changeWk(1)">›</button>
        </div>
        <span class="wk-phase-tag" id="wkPhaseTag"></span>
      </div>
      <div class="day-list" id="dayList"></div>
    </div>

    <div class="scr" id="scrSess"></div>

    <div class="scr" id="scrProg">
      <div id="progHeroWrap"></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="stSes">0</div><div class="stat-lbl">Sesiones</div></div>
        <div class="stat-card"><div class="stat-num" id="stRac">0</div><div class="stat-lbl">Racha</div></div>
        <div class="stat-card"><div class="stat-num" id="stWk">0/6</div><div class="stat-lbl">Esta semana</div></div>
      </div>
      <div class="sec" style="margin-top:10px">Fases del programa</div>
      <div class="phase-pills-wrap" id="phasePills"></div>
      <div class="sec" style="margin-top:10px">Historial reciente</div>
      <div id="logList"></div>
      <div class="spacer"></div>
    </div>

  </div>

  <div class="tabs">
    <button class="tab on" id="tab-home" onclick="goTab('home')"><span class="tab-i">🏠</span>Inicio</button>
    <button class="tab" id="tab-week" onclick="goTab('week')"><span class="tab-i">📅</span>Semana</button>
    <button class="tab" id="tab-prog" onclick="goTab('prog')"><span class="tab-i">📈</span>Progreso</button>
  </div>

</div>


<script>
/* ══════════════════════════════════════
   QUOTES — 42 frases, rotan por día
══════════════════════════════════════ */
const QQ=[
  {q:'El dolor de hoy es la fuerza de mañana.',a:'Refrán del entrenador'},
  {q:'No tienes que ser grande para empezar, pero sí empezar para ser grande.',a:'Zig Ziglar'},
  {q:'La constancia hace lo que el talento solo promete.',a:'Anónimo'},
  {q:'Cuida tu cuerpo. Es el único lugar que tienes para vivir.',a:'Jim Rohn'},
  {q:'El cuerpo consigue lo que la mente cree.',a:'Bill Phillips'},
  {q:'Mereces sentirte bien. Mereces moverte sin dolor.',a:'Gabriel'},
  {q:'Un paso dado hoy vale más que una maratón soñada mañana.',a:'Anónimo'},
  {q:'No busques la perfección. Busca el progreso.',a:'Anónimo'},
  {q:'La disciplina es elegir entre lo que quieres ahora y lo que más quieres.',a:'Abraham Lincoln'},
  {q:'El movimiento es medicina para la mente y el cuerpo.',a:'Dr. W. Bortz'},
  {q:'Eres más fuerte de lo que crees. Lo estás demostrando.',a:'Gabriel'},
  {q:'Cada día que te mueves, le ganas un poco a la inactividad.',a:'Anónimo'},
  {q:'La fuerza viene de superar lo que pensabas que no podías.',a:'Rikki Rogers'},
  {q:'Hoy, un poco mejor que ayer. Solo un poco.',a:'Filosofía Kaizen'},
  {q:'El esfuerzo nunca miente. Nunca.',a:'Anónimo'},
  {q:'Los grandes cambios empiezan con pequeños pasos diarios.',a:'Anónimo'},
  {q:'La salud no es un destino. Es un camino que vale la pena recorrer.',a:'Anónimo'},

const EX={
  march:{n:'Marcha en sitio',m:'Calentamiento general',rest:0,

  catcow:{n:'Cat-cow (columna)',m:'Columna vertebral',rest:0,

  hipcircles:{n:'Círculos de cadera',m:'Cadera · lumbar',rest:0,

  jointrot:{n:'Rotaciones articulares',m:'Todo el cuerpo',rest:0,

  shadowwarm:{n:'Sombra de boxeo (calentamiento)',m:'Hombros · coordinación',rest:0,

  hiplot:{n:'Rotación de cadera de pie',m:'Cadera · pelvis',rest:0,

  birddog:{n:'Bird-dog',m:'Core profundo · lumbar',rest:45,
    d:'En cuadrupedia: extiende el brazo derecho hacia delante y la pierna izquierda hacia atrás al mismo tiempo. Espalda completamente plana, caderas niveladas. Aguanta 3 segundos, vuelve al centro con control. Alterna lados.',

  birddogh:{n:'Bird-dog con aguante prolongado',m:'Core profundo · estabilidad',rest:45,
    d:'Igual que el bird-dog estándar pero aguantando 5 segundos en la posición extendida antes de volver. Mayor activación de los músculos estabilizadores profundos.',

  deadbug:{n:'Dead bug (insecto muerto)',m:'Core profundo · anti-rotación',rest:45,
    d:'Tumbado boca arriba, brazos hacia el techo, rodillas a 90° en el aire. Baja lentamente el brazo derecho sobre la cabeza mientras extiendes la pierna izquierda. La espalda baja siempre pegada al suelo. Vuelve al centro y alterna.',
    tip:'Si la espalda se despega del suelo, reduce cuánto bajas brazo y pierna. Eso es correcto, no un fallo.'},
  glubridge:{n:'Puente de glúteos',m:'Glúteos · lumbar',rest:45,
    d:'Tumbado boca arriba, rodillas dobladas, pies en el suelo. Aprieta los glúteos y empuja las caderas hacia arriba hasta formar una línea recta de rodillas a hombros. Aguanta 2 segundos arriba y baja lento.',

  glubridgep:{n:'Puente de glúteos con pausa',m:'Glúteos · activación',rest:45,

    tip:'Este pequeño cambio multiplica la activación muscular. Con el tiempo notarás una mejora clara en la estabilidad de la espalda.'},
  singlebridge:{n:'Puente unilateral de glúteos',m:'Glúteos · estabilidad pélvica',rest:45,
    d:'Desde la posición de puente, extiende una pierna completamente manteniendo las caderas al mismo nivel. Aguanta 3 segundos y vuelve a las dos piernas antes de cambiar de lado.',

  plankknees:{n:'Plancha en rodillas',m:'Core · estabilidad',rest:45,
    d:'Boca abajo, antebrazos apoyados (codos bajo los hombros) y rodillas en el suelo. Línea recta de rodillas a nuca. Activa el abdomen y aguanta.',
    tip:'No subas ni bajes las caderas. Si pierdes la línea recta, descansa. La calidad del aguante importa más que el tiempo.'},
  planktoes:{n:'Plancha completa (puntas)',m:'Core · cuerpo completo',rest:45,
    d:'Igual que la plancha en rodillas pero apoyado en puntas de pie. Línea perfecta de talones a nuca. Activa abdomen, glúteos y muslos.',
    tip:'Si notas tensión en la lumbar, vuelve a la versión en rodillas. Mejor plancha en rodillas perfecta que plancha completa con mala postura.'},
  plankreach:{n:'Plancha con extensión de brazo',m:'Core · anti-rotación',rest:45,
    d:'Desde la plancha en rodillas, levanta un brazo hacia delante a la altura del hombro. Aguanta 3 segundos sin rotar las caderas. Alterna brazos.',
    tip:'El reto es que el tronco no gire al levantar el brazo. El abdomen apretado es lo que lo impide.'},
  superman:{n:'Superman modificado',m:'Extensores de espalda · glúteos',rest:45,
    d:'Tumbado boca abajo, brazos extendidos al frente. Levanta suavemente brazos, pecho y cabeza unos pocos centímetros del suelo. Aguanta 3 segundos y baja con control.',
    tip:'El movimiento es pequeño: solo 3–5 cm del suelo. No fuerces más rango. La contracción muscular importa, no la altura.'},
  bandrowsit:{n:'Remo sentado con banda',m:'Espalda media · bíceps',rest:60,
    d:'Sentado en silla, banda anclada al frente. Con un extremo en cada mano, tira hacia el ombligo manteniendo los codos pegados y los hombros hacia atrás.',
    tip:'El movimiento viene de apretar la espalda, no de tirar con los brazos. Agarre relajado para proteger las manos.'},
  bandrowst:{n:'Remo de pie con banda',m:'Espalda media · core',rest:60,
    d:'De pie, banda anclada al frente a la altura del pecho. Ligera inclinación hacia delante. Tira hacia el ombligo apretando los omóplatos como si aplastaras una nuez entre ellos.',
    tip:'Al estar de pie el core trabaja también para estabilizar. Espalda recta y rodillas ligeramente dobladas.'},
  bandrow1a:{n:'Remo unilateral con banda',m:'Espalda · anti-rotación',rest:60,
    d:'De pie, banda anclada al frente. Con un solo brazo, tira hacia el costado del cuerpo. El tronco permanece completamente estable sin rotar hacia ningún lado.',
    tip:'El reto es el tronco quieto, no el brazo. Aprieta el abdomen con fuerza para no girar.'},
  bandpresssit:{n:'Press de hombros sentado',m:'Hombros · tríceps',rest:60,
    d:'Sentado, pisa la banda con ambos pies. Sujeta un extremo en cada mano a la altura de los hombros. Empuja hacia arriba por encima de la cabeza. Baja lentamente.',
    tip:'No bloquees los codos al subir. La bajada debe ser más lenta que la subida — es donde más trabaja el músculo.'},
  bandpressst:{n:'Press de hombros de pie',m:'Hombros · core · tríceps',rest:60,
    d:'De pie, pisa la banda. Desde la altura de los hombros, empuja hacia arriba. El core trabaja activamente para mantener la columna recta.',
    tip:'No arquees la espalda al empujar. Si lo haces, reduce la resistencia acortando la banda.'},
  wallpush:{n:'Flexión en pared',m:'Pecho · hombros · tríceps',rest:45,
    d:'De pie frente a la pared, palmas a la altura del pecho. Inclínate doblando los codos y empuja volviendo a la posición inicial. El cuerpo recto como una tabla.',
    tip:'Cuanto más lejos te sitúes de la pared, más difícil. La progresión natural es: pared → mesa → suelo.'},
  inclinepush:{n:'Flexión inclinada (mesa)',m:'Pecho · hombros · tríceps',rest:45,
    d:'Apoya las manos en una mesa firme o en el respaldo de una silla robusta. Con el cuerpo en línea recta, dóblate hacia la superficie y empuja.',
    tip:'Más baja la superficie = más difícil. Comprueba que la superficie sea estable antes de empezar.'},
  bandpull:{n:'Separación de banda (pull-apart)',m:'Espalda alta · postura',rest:45,
    d:'De pie o sentado, sujeta la banda con las dos manos a la anchura de los hombros, brazos extendidos al frente. Estira la banda separando las manos hacia los lados hasta pegarla al pecho. Vuelve lentamente.',
    tip:'La vuelta lenta es donde ocurre el trabajo real. No dejes que la banda te devuelva — contrólala.'},
  bandfacepull:{n:'Face pull con banda',m:'Hombros posteriores · postura',rest:45,
    d:'Banda anclada a la altura de la cara. Sujeta los extremos y tira hacia la cara separando las manos. Los codos acaban por encima de los hombros. Vuelve lentamente.',
    tip:'Fundamental para la salud de los hombros a largo plazo. Contrarresta la postura encorvada del trabajo sentado.'},
  bandbicep:{n:'Curl de bíceps con banda',m:'Bíceps · antebrazo',rest:45,
    d:'De pie, pisa la banda. Brazos a los lados, dobla los codos trayendo las manos hacia los hombros. La bajada dura el doble que la subida.',
    tip:'Prueba el agarre en martillo (pulgares arriba) si el agarre normal causa molestia en muñecas o manos.'},
  bandtricep:{n:'Extensión de tríceps con banda',m:'Tríceps',rest:45,
    d:'Banda anclada arriba. Sujeta con ambas manos, codos doblados junto a la cabeza. Extiende los brazos hacia abajo manteniendo los codos quietos y pegados. Vuelve lentamente.',
    tip:'Los codos no se mueven del sitio. Si se separan hacia los lados, el ejercicio pierde toda su efectividad.'},
  bandrowcurl:{n:'Remo + curl de bíceps',m:'Espalda · bíceps',rest:45,
    d:'Remo de pie con banda y al llegar al final añade la flexión del bíceps. Movimiento fluido y continuo.',
    tip:'La fluidez hace que los músculos trabajen de forma más funcional. Cuida el agarre para no forzar las muñecas.'},
  chairsquat:{n:'Sentadilla a silla',m:'Cuádriceps · glúteos · lumbar',rest:60,
    d:'De pie frente a una silla, pies a la anchura de los hombros. Dobla rodillas y caderas hasta rozar la silla sin llegar a sentarte. Vuelve arriba. Espalda recta, peso en los talones.',
    tip:'Las rodillas siguen la dirección de los pies — nunca se meten hacia dentro. La silla es tu límite de seguridad.'},
  bandsquat:{n:'Sentadilla con banda',m:'Cuádriceps · glúteos · core',rest:60,
    d:'Pisa la banda con ambos pies a la anchura de los hombros. Sujeta los extremos a la altura de los hombros. Baja en sentadilla manteniendo el pecho levantado.',

  wallsquat:{n:'Sentadilla en pared (wall sit)',m:'Cuádriceps · isométrico',rest:30,
    d:'Apoya la espalda en la pared y deslízate hacia abajo hasta que los muslos estén lo más cercanos a paralelos al suelo que puedas sin dolor. Mantén la posición el tiempo indicado.',
    tip:'Los pies deben estar lo suficientemente alejados de la pared para que las rodillas queden sobre los tobillos, no por delante.'},
  squatpress:{n:'Sentadilla + press de hombros',m:'Cuerpo completo · cardio',rest:60,
    d:'Pisa la banda, sujeta los extremos a los hombros. Baja en sentadilla y al subir continúa el movimiento empujando los brazos hacia arriba. Un movimiento fluido y continuo.',
    tip:'Combina fuerza de piernas y hombros con trabajo cardiovascular. La fluidez genera el efecto metabólico.'},
  latstep:{n:'Step lateral suave',m:'Cadera · aductores',rest:30,
    d:'Da un paso lateral con el pie derecho y luego junta el pie izquierdo. Repite en esa dirección el número indicado y vuelve al otro lado. Tranquilo y controlado.',
    tip:'Mantén el torso erguido y el abdomen ligeramente activo. No hace falta velocidad.'},
  bandlat:{n:'Marcha lateral con banda',m:'Glúteo medio · cadera · rodillas',rest:45,
    d:'Coloca la banda alrededor de los tobillos. Pies a la anchura de las caderas, rodillas ligeramente dobladas. Da 10 pasos laterales a cada lado manteniendo la tensión en la banda.',
    tip:'Si la banda se afloja al juntar los pies, los estás juntando demasiado. Mantén siempre algo de separación.'},
  stepup:{n:'Subida al escalón',m:'Cuádriceps · glúteos · equilibrio',rest:60,
    d:'De pie frente a un escalón o superficie firme de unos 20–25 cm. Coloca el pie derecho en el escalón y empuja con ese pie para subir. Baja con control y repite. Completa las repeticiones y cambia de pierna.',
    tip:'Todo el trabajo lo hace el pie que está arriba. El pie de abajo no empuja — solo toca el suelo para equilibrio.'},
  revlunge:{n:'Zancada inversa',m:'Cuádriceps · glúteos · equilibrio',rest:60,
    d:'De pie, da un paso hacia atrás con una pierna. Deja caer la rodilla trasera hacia el suelo sin tocarlo mientras el tronco se mantiene erguido. El peso en el pie delantero. Vuelve a la posición inicial.',
    tip:'La zancada hacia atrás es más segura para la columna que la hacia delante. Si hay molestia en la rodilla delantera, reduce cuánto bajas.'},
  banddead:{n:'Peso muerto con banda',m:'Cadena posterior · glúteos · lumbar',rest:60,
    d:'Pisa la banda con ambos pies a la anchura de las caderas. Sujeta los extremos. Con la espalda recta, inclina ligeramente la cadera hacia atrás. Vuelve extendiendo la cadera hacia delante hasta quedar completamente recto.',
    tip:'El movimiento nace de la cadera, no de la espalda. Si sientes tensión lumbar, reduce el rango. Espalda neutral siempre.'},
  hipthrust:{n:'Hip thrust',m:'Glúteos · cadena posterior',rest:45,
    d:'Apoya la parte alta de la espalda en el borde firme de una silla o sofá. Pies en el suelo, rodillas a 90°. Baja las caderas y súbelas apretando los glúteos hasta quedar paralelo al suelo.',
    tip:'Barbilla hacia el pecho durante todo el movimiento. Si miras hacia arriba, la columna cervical se comprime.'},
  calfraise:{n:'Elevación de talones',m:'Gemelos · tobillos',rest:30,
    d:'De pie con las manos apoyadas en la pared para equilibrio. Eleva ambos talones subiendo sobre las puntas. Aguanta 1 segundo arriba y baja muy lentamente (3 segundos).',
    tip:'La bajada lenta es donde más trabaja el músculo. Si ya resulta fácil, hazlo en el borde de un escalón.'},
  hipflex:{n:'Estiramiento de psoas (cadera)',m:'Flexores de cadera · lumbar',rest:0,
    d:'Una rodilla en el suelo (puedes poner un cojín), la otra pierna adelantada con el pie en el suelo. Empuja las caderas hacia delante y ligeramente abajo hasta notar el estiramiento en la parte delantera del muslo.',
    tip:'El psoas es el músculo que más se tensa al pasar horas sentado. Su rigidez contribuye directamente al dolor lumbar.'},
  piriforme:{n:'Estiramiento piriforme (figura 4)',m:'Piriforme · ciática',rest:0,
    d:'Tumbado boca arriba, dobla la rodilla derecha y coloca el tobillo derecho sobre la rodilla izquierda. Empuja suavemente la rodilla derecha hacia el suelo. Para intensificar, levanta la pierna izquierda.',
    tip:'Este estiramiento alivia directamente la presión sobre el nervio ciático. Si se siente en la parte trasera de la pierna, es exactamente donde debe sentirse.'},
  hamstring:{n:'Estiramiento de isquiotibiales',m:'Isquiotibiales · ciática',rest:0,
    d:'Tumbado boca arriba, lleva una pierna extendida hacia el pecho sujetándola con las manos o con la banda. La otra pierna permanece en el suelo. Mantén la pierna lo más recta que puedas sin dolor.',
    tip:'Si hay tensión detrás de la rodilla, dobla ligeramente la rodilla. Los isquiotibiales cortos aumentan la tensión sobre la ciática.'},
  childpose:{n:'Postura del niño modificada',m:'Lumbar · caderas · hombros',rest:0,
    d:'De rodillas con las rodillas separadas a la anchura de las caderas o más. Siéntate hacia los talones y extiende los brazos al frente dejando que el torso caiga entre los muslos.',
    tip:'Si los talones no llegan a los glúteos, coloca una toalla doblada entre muslos y pantorrillas. Esta postura descomprime activamente la columna lumbar.'},
  thoracicrot:{n:'Rotación torácica en suelo',m:'Columna torácica · movilidad',rest:0,
    d:'Tumbado de lado con las rodillas dobladas a 90°. Extiende los brazos al frente con las palmas juntas. Lleva el brazo superior hacia el otro lado rotando solo la parte media de la espalda, manteniendo las rodillas en el suelo.',
    tip:'La rotación es de la columna torácica (media), no de la lumbar. Las rodillas no se mueven. Si se mueven, reduce el rango.'},
  lumbartwist:{n:'Torsión lumbar suave',m:'Lumbar · piriformes',rest:0,
    d:'Tumbado boca arriba, dobla las rodillas hacia el pecho y déjalas caer suavemente hacia un lado mientras los hombros permanecen en el suelo. Aguanta y cambia de lado.',
    tip:'Sin forzar. Deja que la gravedad haga el trabajo. El alivio inmediato que se siente es la descompresión de la lumbar.'},
  chestopen:{n:'Apertura de pecho con banda',m:'Pecho · hombros · postura',rest:0,
    d:'De pie o sentado. Sujeta la banda detrás de la espalda con las dos manos, palmas hacia fuera. Estira la banda alejando las manos, abriendo el pecho y llevando los hombros hacia atrás.',
    tip:'Ideal para contrarrestar la postura encorvada. Con el tiempo notarás que mantener los hombros atrás requiere menos esfuerzo.'},
  pigeon:{n:'Paloma modificada',m:'Piriforme · cadera profunda',rest:0,
    d:'En el suelo, coloca la pierna derecha doblada al frente (espinilla lo más paralela posible al frente) y extiende la pierna izquierda hacia atrás. Inclínate progresivamente hacia delante sobre la pierna delantera.',
    tip:'Si resulta muy intenso en la rodilla o cadera, mantén la versión de figura 4 tumbado. Ambas son igual de efectivas.'},
  boxing1:{n:'Saco de boxeo — 1 minuto',m:'Cardio · estrés · coordinación',rest:60,
    d:'Golpea el saco durante 1 minuto con golpes suaves y rítmicos. No importa la técnica: importa el ritmo y exhalar en cada golpe.',
    tip:'Con palma abierta o con guantes y vendas. Nunca con el puño cerrado sin protección para preservar las articulaciones de las manos.'},
  boxing2:{n:'Saco de boxeo — 2 minutos',m:'Cardio · potencia · estrés',rest:60,
    d:'2 minutos continuos en el saco buscando un ritmo sostenible. Alterna entre golpes fuertes y suaves para manejar la fatiga. Si necesitas parar 10 segundos, hazlo y vuelve.',
    tip:'El sudor y el pulso alto son exactamente lo que buscamos para quemar grasa. Cada golpe también libera la tensión acumulada.'},
  boxing3:{n:'Saco de boxeo — 3 minutos',m:'Cardio intenso · potencia',rest:90,
    d:'3 minutos continuos. A estas alturas debes notar claramente la fatiga cardiovascular. Mantén los pies en movimiento incluso cuando no golpeas.',
    tip:'Si el pulso sube demasiado, baja la intensidad pero no te pares. Seguir a ritmo bajo es mejor que parar.'},
  boxingcombo:{n:'Saco — combinaciones',m:'Cardio · coordinación · técnica',rest:60,
    d:'Practica combinaciones: (1) jab-jab-cruzado, (2) jab-cruzado-gancho izquierdo. 1 minuto de cada combinación buscando fluidez más que potencia.',
    tip:'El descanso entre combinaciones es activo: da pequeños pasos alrededor del saco. Nunca te quedes completamente parado.'},
  steptoch:{n:'Paso lateral con toque',m:'Cardio suave · coordinación',rest:0,
    d:'Da un paso lateral con el pie derecho y toca el suelo con el pie izquierdo al juntar. Alterna lados de forma rítmica. Puedes añadir los brazos moviéndolos arriba y abajo.',
    tip:'Cardio de bajo impacto perfecto para días en que la espalda está más sensible. Sin impacto en el suelo.'},
  breathdeep:{n:'Respiración abdominal',m:'Sistema nervioso · estrés',rest:0,
    d:'Tumbado o sentado, mano en abdomen y otra en el pecho. Inhala 4 segundos haciendo que solo suba la mano del abdomen. Exhala 6 segundos. La mano del pecho no se mueve.',
    tip:'La exhalación larga activa el sistema nervioso parasimpático, reduciendo el cortisol y el estrés acumulado durante el día.'},
  breath478:{n:'Respiración 4-7-8',m:'Anti-estrés · sistema nervioso',rest:0,
    d:'Inhala por la nariz contando 4 segundos. Aguanta 7 segundos. Exhala lentamente por la boca contando 8 segundos. Repite 5 veces.',
    tip:'Si los 7 segundos son demasiados al principio, hazlo 4-4-6 y ve aumentando. Es la técnica de relajación más efectiva disponible.'},

let startDate=null,completed=[],viewWeekIdx=0;

// Safe storage: works on iOS file://, Android Chrome, and all browsers
const store=(()=>{
  let mem={};
  let ok=false;
  try{localStorage.setItem('_t','1');localStorage.removeItem('_t');ok=true;}catch(e){}
  return{
    get:(k)=>{try{return ok?localStorage.getItem(k):mem[k]||null;}catch(e){return mem[k]||null;}},
    set:(k,v)=>{try{if(ok)localStorage.setItem(k,v);else mem[k]=v;}catch(e){mem[k]=v;}},
    del:(k)=>{try{if(ok)localStorage.removeItem(k);else delete mem[k];}catch(e){delete mem[k];}}
  };
})();

function load(){
  try{
    const d=store.get('fit_start');
    const c=store.get('fit_done');
    if(d) startDate=new Date(d);
    if(c) completed=JSON.parse(c);
  }catch(e){}
}
function save(){
  try{
    if(startDate) store.set('fit_start',startDate.toISOString());
    store.set('fit_done',JSON.stringify(completed));
  }catch(e){}
}
function doneKey(wIdx,dIdx){return`${wIdx}_${dIdx}`;}
function isDone(wIdx,dIdx){return completed.includes(doneKey(wIdx,dIdx));}
function markDone(wIdx,dIdx){
  const k=doneKey(wIdx,dIdx);
  if(!completed.includes(k)){completed.push(k);save();}
}

/* ══════════════════════════════════════
   DATE / WEEK HELPERS
══════════════════════════════════════ */
function daysSince(d){
  const now=new Date();now.setHours(0,0,0,0);
  const s=new Date(d);s.setHours(0,0,0,0);
  return Math.floor((now-s)/86400000);
}
function currentWeekIdx(){
  if(!startDate) return 0;
  const w=Math.floor(daysSince(startDate)/7);
  return Math.min(w,25);
}
function currentDayIdx(){
  if(!startDate) return 0;
  const d=daysSince(startDate)%7;
  return Math.max(0,Math.min(d,6));
}
function phaseOf(wIdx){
  if(wIdx<4)return 0;if(wIdx<8)return 1;if(wIdx<12)return 2;
  if(wIdx<16)return 3;if(wIdx<20)return 4;return 5;
}
function weekOffset(ph){return[0,4,8,12,16,20][ph];}
function countStreak(){
  if(!startDate) return 0;
  let streak=0,d=new Date();d.setHours(0,0,0,0);
  const s=new Date(startDate);s.setHours(0,0,0,0);
  for(let i=0;i<180;i++){
    const diff=Math.floor((d-s)/86400000);
    if(diff<0) break;
    const wIdx=Math.floor(diff/7);const dIdx=diff%7;
    if(wIdx>25) break;
    const sid=PROG[wIdx][dIdx];
    if(sid&&isDone(wIdx,dIdx)) streak++;
    else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

      ${s.blocks.map(b=>b.name?`<span class="sess-tag">${b.name.split(' · ')[0]}</span>`:'').filter(Boolean).join('')}
    </div>
  </div>`;
  if(s.warn) html+=`<div class="warn-box">⚠️ ${s.warn}</div>`;

  let idx=0;
  s.blocks.forEach(blk=>{
    if(blk.name) html+=`<div class="blk-lbl">${blk.name}</div>`;
    blk.exs.forEach(([eid,sets])=>{
      idx++;
      const ex=EX[eid];if(!ex)return;

}

function startTimer(secs,label){
  tTotal=secs;tLeft=secs;
  document.getElementById('tLbl').textContent=label||'Descansando…';
  updTimer();document.getElementById('tOv').classList.add('vis');
  clearInterval(tIv);
  tIv=setInterval(()=>{tLeft--;if(tLeft<=0){clearInterval(tIv);tLeft=0;if(navigator.vibrate)navigator.vibrate([200,100,200]);}updTimer();},1000);
}
function updTimer(){
  document.getElementById('tNum').textContent=tLeft;
  const circ=2*Math.PI*82;
  const pct=tLeft/tTotal;
  document.getElementById('tArc').setAttribute('stroke-dashoffset',circ*(1-pct));
  document.getElementById('tArc').setAttribute('stroke',tLeft<=5?'#f09595':'#a8d5c4');
}
function stopTimer(){clearInterval(tIv);document.getElementById('tOv').classList.remove('vis');}

/* ══════════════════════════════════════
   PROGRESS SCREEN
══════════════════════════════════════ */
function renderProg(){
  const wIdx=currentWeekIdx();
  const ph=phaseOf(wIdx);const phase=PHASES[ph];
  const streak=countStreak();
  const thisWeekDone=DAYS.map((_,di)=>{const s=PROG[wIdx][di];return s&&isDone(wIdx,di)?1:0;}).reduce((a,b)=>a+b,0);
  const totalDone=completed.length;

  // Hero
  const phStart=weekOffset(ph);const phLen=ph===5?6:4;
  const phPct=Math.round(((wIdx-phStart)/phLen)*100);
  document.getElementById('progHeroWrap').innerHTML=`<div class="prog-hero" style="background:linear-gradient(150deg,${phase.c},${phase.c}bb)">
    <div class="prog-title">Mi progreso</div>
    <div class="prog-sub">Semana ${wIdx+1} de 26 · ${phase.name}</div>
    <div class="prog-phase-wrap">
      <div class="prog-phase-name">${phase.name}</div>
      <div class="prog-phase-desc">${phase.desc}</div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${Math.max(2,phPct)}%"></div></div>
      <div class="prog-bar-lbl"><span>Sem. ${phase.weeks}</span><span>${phPct}% completada</span></div>
    </div>
  </div>`;

  document.getElementById('stSes').textContent=totalDone;
  document.getElementById('stRac').textContent=streak;
  document.getElementById('stWk').textContent=thisWeekDone+'/6';

  // Phase pills
  const pillsEl=document.getElementById('phasePills');
  pillsEl.innerHTML=PHASES.map((p,i)=>{
    const isCur=i===ph;
    const isDonePh=weekOffset(i)<wIdx;
    return`<div class="phase-pill${isCur?' cur':''}${isDonePh&&!isCur?' done-ph':''}" style="${isCur?'background:'+p.c+';border-color:'+p.c:''}">${p.name.split(' — ')[0]}<span class="phase-pill-wk">Sem. ${p.weeks}</span></div>`;
  }).join('');

  // Log
  const logEl=document.getElementById('logList');
  if(completed.length===0){
    logEl.innerHTML=`<div style="padding:0 12px;font-size:13px;color:var(--t3)">Completa tu primera sesión para ver el historial aquí.</div>`;
    return;
  }
  const icons={strength:'💪',mobility:'🧘',functional:'🥊',rest:'🚶'};
  let html='';
  [...completed].reverse().slice(0,12).forEach(k=>{
    const[wi,di]=k.split('_').map(Number);
    if(wi>25||di>6) return;
    const sid=PROG[wi][di];if(!sid) return;
    const s=SS[sid];
    html+=`<div class="log-item">
      <div class="log-icon">${icons[s.type]||'✓'}</div>
      <div style="flex:1"><div class="log-name">${s.title}</div><div class="log-date">Semana ${wi+1} · ${DAYS[di]}</div></div>
      <div class="log-ck">✓</div>
    </div>`;
  });
  logEl.innerHTML=html||`<div style="padding:0 12px;font-size:13px;color:var(--t3)">Completa tu primera sesión para ver el historial aquí.</div>`;
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
function doReset(){
  if(confirm('¿Resetear la fecha de inicio del programa a hoy?\n\nEsto reiniciará la semana actual pero no borrará el historial de sesiones.')){
    startDate=new Date();
    startDate.setHours(0,0,0,0);
    save();
    viewWeekIdx=0;
    goTab('home');
  }
}

load();
if(!startDate){
